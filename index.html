<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #eee;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#info { display: flex; gap: 2rem; margin-bottom: 10px; font-size: 1.1rem; }
#info span { color: #0f0; }
canvas {
  border: 2px solid #0f0;
  border-radius: 4px;
  background: #16213e;
}
#controls {
  display: none;
  margin-top: 20px;
  position: relative;
  width: 180px;
  height: 180px;
}
.ctrl-btn {
  position: absolute;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 12px;
  background: #0f3460;
  color: #0f0;
  font-size: 1.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { background: #0a2647; }
#btn-up    { top: 0;    left: 60px; }
#btn-down  { bottom: 0; left: 60px; }
#btn-left  { top: 60px; left: 0; }
#btn-right { top: 60px; right: 0; }
#msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.4rem;
  text-align: center;
  display: none;
}
#msg button {
  margin-top: 10px;
  padding: 8px 24px;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  background: #0f0;
  color: #1a1a2e;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="info">得分: <span id="score">0</span> &nbsp; 最高: <span id="best">0</span></div>
<canvas id="board"></canvas>
<div id="controls">
  <button class="ctrl-btn" id="btn-up">▲</button>
  <button class="ctrl-btn" id="btn-down">▼</button>
  <button class="ctrl-btn" id="btn-left">◀</button>
  <button class="ctrl-btn" id="btn-right">▶</button>
</div>
<div id="msg"><p id="msg-text"></p><button onclick="startGame()">再来一局</button></div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
const msgText = document.getElementById('msg-text');

const GRID = 20;
let cols, rows, cellSize;
let snake, dir, nextDir, food, score, best = 0, running, speed, loop;

function resize() {
  const isMobile = ('ontouchstart' in window) || window.innerWidth < 768;
  const size = Math.min(window.innerWidth - 20, window.innerHeight - (isMobile ? 320 : 120), 500);
  cols = rows = Math.floor(size / GRID);
  cols = Math.max(10, cols);
  rows = Math.max(10, rows);
  cellSize = GRID;
  canvas.width = cols * GRID;
  canvas.height = rows * GRID;
  document.getElementById('controls').style.display = isMobile ? 'block' : 'none';
}

function init() {
  resize();
  snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  speed = 120;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows)};
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // food
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x*GRID+GRID/2, food.y*GRID+GRID/2, GRID/2-2, 0, Math.PI*2);
  ctx.fill();
  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#0f0' : '#53b72e';
    ctx.fillRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2);
    ctx.fillStyle = i === 0 ? '#0a0' : '#3a8a20';
    ctx.fillRect(s.x*GRID+3, s.y*GRID+3, GRID-6, GRID-6);
  });
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
    if (speed > 50) speed -= 2;
  } else {
    snake.pop();
  }
  draw();
  if (running) loop = setTimeout(step, speed);
}

function gameOver() {
  running = false;
  msgText.textContent = `游戏结束！得分: ${score}`;
  msgEl.style.display = 'block';
}

function startGame() {
  msgEl.style.display = 'none';
  clearTimeout(loop);
  init();
  running = true;
  draw();
  loop = setTimeout(step, speed);
}

function setDir(x, y) {
  if (dir.x === -x && dir.y === -y) return;
  if (x !== 0 || y !== 0) nextDir = {x, y};
}

// keyboard
document.addEventListener('keydown', e => {
  if (['ArrowUp','w'].includes(e.key))    { e.preventDefault(); setDir(0,-1); }
  if (['ArrowDown','s'].includes(e.key))   { e.preventDefault(); setDir(0,1); }
  if (['ArrowLeft','a'].includes(e.key))   { e.preventDefault(); setDir(-1,0); }
  if (['ArrowRight','d'].includes(e.key))  { e.preventDefault(); setDir(1,0); }
});

// buttons
document.getElementById('btn-up').addEventListener('touchstart',    e => { e.preventDefault(); setDir(0,-1); });
document.getElementById('btn-down').addEventListener('touchstart',  e => { e.preventDefault(); setDir(0,1); });
document.getElementById('btn-left').addEventListener('touchstart',  e => { e.preventDefault(); setDir(-1,0); });
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); setDir(1,0); });

// swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
});

window.addEventListener('resize', () => { if (!running) { resize(); draw(); } });

init();
draw();
msgEl.style.display = 'block';
msgText.textContent = '按任意方向开始';
document.querySelector('#msg button').textContent = '开始游戏';
</script>
</body>
</html>
